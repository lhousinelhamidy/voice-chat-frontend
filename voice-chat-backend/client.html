<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Chat - Free & Encrypted</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
        }

        .status.connected {
            background: #d4edda;
            color: #155724;
        }

        .status.disconnected {
            background: #f8d7da;
            color: #721c24;
        }

        .users-list {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .users-list h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .user-item {
            padding: 8px;
            background: white;
            border-radius: 6px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-indicator {
            width: 10px;
            height: 10px;
            background: #28a745;
            border-radius: 50%;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .control-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .mute-btn {
            background: #ffc107;
            color: #333;
        }

        .leave-btn {
            background: #dc3545;
            color: white;
        }

        .hidden {
            display: none;
        }

        .encryption-badge {
            background: #28a745;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 Voice Chat</h1>
        <div style="text-align: center;">
            <span class="encryption-badge">🔒 Encrypted Connection</span>
        </div>

        <!-- Login Form -->
        <div id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <label for="roomId">Room ID</label>
                <input type="text" id="roomId" placeholder="Enter room ID (e.g., room1)" required>
            </div>
            <button id="joinBtn" onclick="joinRoom()">Join Voice Chat</button>
        </div>

        <!-- Voice Chat Interface -->
        <div id="voiceInterface" class="hidden">
            <div id="status" class="status connected">Connected</div>
            
            <div class="users-list">
                <h3>Users in Room</h3>
                <div id="usersList"></div>
            </div>

            <div class="controls">
                <button class="control-btn mute-btn" id="muteBtn" onclick="toggleMute()">🎤 Unmuted</button>
                <button class="control-btn leave-btn" onclick="leaveRoom()">Leave</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        const SERVER_URL = 'http://localhost:3001';
        let socket;
        let localStream;
        let peerConnections = {};
        let isMuted = false;
        let currentRoom = null;
        let currentUsername = null;

        // Simple XOR encryption/decryption (same as backend)
        const ENCRYPTION_KEY = 'my-super-secret-voice-chat-key-2024';

        function encrypt(data) {
            let encrypted = '';
            for (let i = 0; i < data.length; i++) {
                const charCode = data.charCodeAt(i) ^ ENCRYPTION_KEY.charCodeAt(i % ENCRYPTION_KEY.length);
                encrypted += String.fromCharCode(charCode);
            }
            return btoa(encrypted);
        }

        function decrypt(encryptedData) {
            const decoded = atob(encryptedData);
            let decrypted = '';
            for (let i = 0; i < decoded.length; i++) {
                const charCode = decoded.charCodeAt(i) ^ ENCRYPTION_KEY.charCodeAt(i % ENCRYPTION_KEY.length);
                decrypted += String.fromCharCode(charCode);
            }
            return decrypted;
        }

        async function joinRoom() {
            const username = document.getElementById('username').value.trim();
            const roomId = document.getElementById('roomId').value.trim();

            if (!username || !roomId) {
                alert('Please enter both username and room ID');
                return;
            }

            currentUsername = username;
            currentRoom = roomId;

            // Connect to Socket.IO
            socket = io(SERVER_URL);

            socket.on('connect', () => {
                console.log('Connected to server');
                socket.emit('join-room', { roomId, username });
            });

            socket.on('room-users', ({ users }) => {
                console.log('Users in room:', users);
                updateUsersList(users);
                users.forEach(user => {
                    createPeerConnection(user.id, true);
                });
            });

            socket.on('user-joined', ({ userId, username }) => {
                console.log('User joined:', userId);
                const decryptedUsername = decrypt(username);
                add_user_to_list(userId, decryptedUsername);
                createPeerConnection(userId, true);
            });

            socket.on('user-left', ({ userId }) => {
                console.log('User left:', userId);
                remove_user_from_list(userId);
                if (peerConnections[userId]) {
                    peerConnections[userId].close();
                    delete peerConnections[userId];
                }
            });

            socket.on('webrtc-offer', async ({ senderId, offer }) => {
                console.log('Received offer from:', senderId);
                const decryptedOffer = JSON.parse(decrypt(offer));
                await handleOffer(senderId, decryptedOffer);
            });

            socket.on('webrtc-answer', async ({ senderId, answer }) => {
                console.log('Received answer from:', senderId);
                const decryptedAnswer = JSON.parse(decrypt(answer));
                await handleAnswer(senderId, decryptedAnswer);
            });

            socket.on('ice-candidate', async ({ senderId, candidate }) => {
                console.log('Received ICE candidate from:', senderId);
                const decryptedCandidate = JSON.parse(decrypt(candidate));
                await handleIceCandidate(senderId, decryptedCandidate);
            });

            // Get local audio stream
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: true,
                    video: false 
                });
                
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('voiceInterface').classList.remove('hidden');
                updateUsersList([]);
            } catch (err) {
                console.error('Error accessing microphone:', err);
                alert('Could not access microphone. Please allow microphone access.');
            }
        }

        function createPeerConnection(userId, isInitiator) {
            const config = {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            };

            const pc = new RTCPeerConnection(config);
            peerConnections[userId] = pc;

            // Add local audio tracks
            localStream.getTracks().forEach(track => {
                pc.addTrack(track, localStream);
            });

            // Handle remote tracks
            pc.ontrack = (event) => {
                console.log('Received remote track from:', userId);
                const audio = new Audio();
                audio.srcObject = event.streams[0];
                audio.autoplay = true;
                audio.id = `audio-${userId}`;
                document.body.appendChild(audio);
            };

            // Handle ICE candidates
            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('ice-candidate', {
                        targetUserId: userId,
                        candidate: event.candidate,
                        roomId: currentRoom
                    });
                }
            };

            // If initiator, create and send offer
            if (isInitiator) {
                pc.createOffer()
                    .then(offer => pc.setLocalDescription(offer))
                    .then(() => {
                        socket.emit('webrtc-offer', {
                            targetUserId: userId,
                            offer: pc.localDescription,
                            roomId: currentRoom
                        });
                    });
            }

            return pc;
        }

        async function handleOffer(userId, offer) {
            const pc = peerConnections[userId] || createPeerConnection(userId, false);
            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            
            socket.emit('webrtc-answer', {
                targetUserId: userId,
                answer: pc.localDescription,
                roomId: currentRoom
            });
        }

        async function handleAnswer(userId, answer) {
            const pc = peerConnections[userId];
            if (pc) {
                await pc.setRemoteDescription(new RTCSessionDescription(answer));
            }
        }

        async function handleIceCandidate(userId, candidate) {
            const pc = peerConnections[userId];
            if (pc && candidate) {
                try {
                    await pc.addIceCandidate(new RTCIceCandidate(candidate));
                } catch (err) {
                    console.error('Error adding ICE candidate:', err);
                }
            }
        }

        function updateUsersList(users) {
            const list = document.getElementById('usersList');
            list.innerHTML = '';
            
            // Add current user
            const currentUserDiv = document.createElement('div');
            currentUserDiv.className = 'user-item';
            currentUserDiv.innerHTML = `
                <div class="user-indicator"></div>
                <span>${currentUsername} (You)</span>
            `;
            list.appendChild(currentUserDiv);

            // Add other users
            users.forEach(user => {
                add_user_to_list(user.id, user.username);
            });
        }

        function add_user_to_list(userId, username) {
            const list = document.getElementById('usersList');
            const existingUser = document.getElementById(`user-${userId}`);
            if (existingUser) return;

            const userDiv = document.createElement('div');
            userDiv.className = 'user-item';
            userDiv.id = `user-${userId}`;
            userDiv.innerHTML = `
                <div class="user-indicator"></div>
                <span>${username}</span>
            `;
            list.appendChild(userDiv);
        }

        function remove_user_from_list(userId) {
            const userElement = document.getElementById(`user-${userId}`);
            if (userElement) {
                userElement.remove();
            }
            const audioElement = document.getElementById(`audio-${userId}`);
            if (audioElement) {
                audioElement.remove();
            }
        }

        function toggleMute() {
            isMuted = !isMuted;
            localStream.getAudioTracks().forEach(track => {
                track.enabled = !isMuted;
            });
            
            const btn = document.getElementById('muteBtn');
            btn.textContent = isMuted ? '🔇 Muted' : '🎤 Unmuted';
        }

        function leaveRoom() {
            if (socket) {
                socket.disconnect();
            }
            
            Object.values(peerConnections).forEach(pc => pc.close());
            peerConnections = {};
            
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            
            // Remove all audio elements
            document.querySelectorAll('audio[id^="audio-"]').forEach(audio => audio.remove());
            
            document.getElementById('voiceInterface').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            
            currentRoom = null;
            currentUsername = null;
        }
    </script>
</body>
</html>
