<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خطأ - Voice Chat</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .error-container {
            text-align: center;
            padding: 60px 20px;
        }
        .error-icon {
            font-size: 5em;
            margin-bottom: 20px;
        }
        .error-title {
            font-size: 2em;
            color: white;
            margin-bottom: 15px;
        }
        .error-message {
            color: rgba(255,255,255,0.9);
            font-size: 1.1em;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-container">
            <div class="error-icon">❌</div>
            <h1 class="error-title">عذراً، حدث خطأ</h1>
            <p class="error-message" id="error-text">لم نتمكن من الاتصال بالسيرفر</p>
            
            <div class="card">
                <h3>الحلول الممكنة:</h3>
                <ul style="text-align: right; padding-right: 20px;">
                    <li>تأكد من تشغيل السيرفر على port 3000</li>
                    <li>تحقق من اتصالك بالإنترنت</li>
                    <li>جرّب تحديث الصفحة</li>
                    <li>تأكد من السماح بالوصول للميكروفون</li>
                </ul>
                
                <div style="margin-top: 30px;">
                    <button class="btn btn-primary" onclick="window.location.href='index.html'">
                        العودة للصفحة الرئيسية
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
